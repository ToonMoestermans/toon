<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="images/Favicon.png">
<style>
body {
  margin: 0;
  font-family: monospace;
  background: #ddd;
  cursor: crosshair;
  font-size: 10px;
  user-select: none;
  -webkit-user-select: none;
  -moz-user-select: none;
  -ms-user-select: none;
}

p {
  margin-left: 10px;
  margin-bottom: 0;
}

.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(clamp(100px, 20vw, 200px), 1fr));
  gap: 10px;
  padding: 10px;
}

img {
  width: 100%;
  pointer-events: auto;
  -webkit-user-drag: none;
  user-drag: none;
}

#popup {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,0.95);
  justify-content: center;
  align-items: center;
  flex-direction: column;
  padding: 10px;
}

#popup img {
  max-width: 90vw;
  max-height: 90vh;
  object-fit: contain;
}
</style>
</head>

</div>

<div id="popup">
  <img id="big" draggable="false">
  <p id="cap"></p>
</div>

<script>
const p = document.getElementById('popup');
const big = document.getElementById('big');
const cap = document.getElementById('cap');

// blokkeer rechtsklik
window.addEventListener('contextmenu', e => e.preventDefault());

// blokkeer slepen
window.addEventListener('dragstart', e => e.preventDefault());

// blokkeer enkele sneltoetsen (save/devtools/view source)
window.addEventListener('keydown', e => {
  if (
    e.key === 'F12' ||
    (e.ctrlKey && ['u', 's', 'p'].includes(e.key.toLowerCase())) ||
    (e.ctrlKey && e.shiftKey && ['i', 'j', 'c'].includes(e.key.toLowerCase()))
  ) {
    e.preventDefault();
  }

  if (e.key === 'Escape') p.style.display = 'none';
});

document.getElementById('g').onclick = e => {
  if (e.target.tagName !== 'IMG') return;
  big.src = e.target.src;
  cap.textContent = e.target.dataset.t;
  p.style.display = 'flex';
};

p.onclick = () => p.style.display = 'none';
</script>
